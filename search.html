/* ===== NAVBAR ===== */

/* عكس الخريطة (إنجليزي → عربي) */
const TRANSLIT_REV={}; for(const k in TRANSLIT){ const v=TRANSLIT[k]; if(!TRANSLIT_REV[v]) TRANSLIT_REV[v]=k; }

/* تطبيع النص: إزالة التشكيل، توحيد الألف/الهمزة/التاء المربوطة/الياء، تصغير الحروف */
function normalize(s){
  return (s==null?'':String(s)).toLowerCase()
    .replace(/[ً-ْٰ]/g,'')      // التشكيل
    .replace(/[إأآا]/g,'ا').replace(/[ؤ]/g,'و').replace(/[ئى]/g,'ي')
    .replace(/ة/g,'ه').replace(/ـ/g,'')
    .replace(/[^\p{L}\p{N}\s+#]/gu,' ')
    .replace(/\s+/g,' ').trim();
}
/* وسّع الاستعلام بكل صيغه: الأصلي + النقل العربي↔إنجليزي */
function expandQuery(q){
  const n=normalize(q); const out=new Set([n]);
  if(TRANSLIT[n]) out.add(normalize(TRANSLIT[n]));
  if(TRANSLIT_REV[n]) out.add(normalize(TRANSLIT_REV[n]));
  /* نقل كل كلمة على حدة */
  const words=n.split(' '); const mapped=words.map(w=> TRANSLIT[w]?normalize(TRANSLIT[w]):(TRANSLIT_REV[w]?normalize(TRANSLIT_REV[w]):w));
  out.add(mapped.join(' '));
  return [...out].filter(Boolean);
}
/* مسافة ليفنشتاين (للأخطاء الإملائية) */
function lev(a,b){
  if(a===b) return 0; const m=a.length,n=b.length; if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i;
    for(let j=1;j<=n;j++){ cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+(a[i-1]===b[j-1]?0:1)); }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
/* درجة المطابقة بين الاستعلام والحقول (0 = لا تطابق) */
const QTERMS = []; // تُملأ بعد قراءة الاستعلام
function scoreMatch(fields){
  const hay = normalize(fields.filter(Boolean).join(' '));
  if(!hay) return 0;
  const hayWords = hay.split(' ');
  let best = 0;
  for(const term of QTERMS){
    if(!term) continue;
    if(hay.includes(term)){ best=Math.max(best, 100); continue; }   // تطابق مباشر بعد التطبيع
    // تطابق على مستوى الكلمة: بداية كلمة، أو تقارب إملائي
    for(const tw of term.split(' ')){
      if(tw.length<2) continue;
      for(const hw of hayWords){
        if(hw===tw){ best=Math.max(best,90); }
        else if(hw.startsWith(tw)||tw.startsWith(hw)){ best=Math.max(best,75); }
        else if(hw.length>3&&tw.length>3){ const d=lev(hw,tw); if(d<=Math.max(1,Math.floor(Math.min(hw.length,tw.length)/4))) best=Math.max(best,60); }
      }
    }
  }
  return best;
}
/* رتّب القائمة حسب الدرجة واحذف ما لا يطابق */
function smartFilter(list, fieldsFn){
  return list.map(it=>({it, sc:scoreMatch(fieldsFn(it))}))
    .filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).map(x=>x.it);
}

/* ===== nav header behavior ===== */
const navSearchInput = document.getElementById('navSearchInput');
navSearchInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const q=navSearchInput.value.trim(); if(q) location.href='search.html?u='+encodeURIComponent(q); }
});
const menuBtn=document.getElementById('menuBtn'), mobileMenu=document.getElementById('mobileMenu'), menuBackdrop=document.getElementById('menuBackdrop');
function toggleMenu(open){ const o=open!==undefined?open:!mobileMenu.classList.contains('open'); mobileMenu.classList.toggle('open',o); menuBackdrop.classList.toggle('show',o); menuBtn.setAttribute('aria-expanded',o); }
menuBtn.addEventListener('click',()=>toggleMenu()); menuBackdrop.addEventListener('click',()=>toggleMenu(false));

/* ===== read query ===== */
const params = new URLSearchParams(location.search);
const Q = (params.get('u')||'').trim();
const lq = Q.toLowerCase();
expandQuery(Q).forEach(t=>QTERMS.push(t));
const searchInput = document.getElementById('searchInput');
searchInput.value = Q;
document.getElementById('searchForm').addEventListener('submit', e=>{
  e.preventDefault(); const v=searchInput.value.trim();
  if(v) location.href='search.html?u='+encodeURIComponent(v);
});
if(Q) document.title = `بحث: ${Q} — مجتمع طلبة الهندسة`;
document.getElementById('resultsHead').textContent = Q ? `نتائج البحث عن: "${Q}"` : '';

/* ===== auth button ===== */
onAuthStateChanged(auth, async (user)=>{
  const btn=document.getElementById('authBtn'), btnMobile=document.getElementById('authBtnMobile');
  if(!user){ btn.className='state-guest'; btn.href='login.html'; btn.innerHTML='تسجيل الدخول'; return; }
  try{
    const snap=await getDocs(query(collection(db,'students'), where('uid','==',user.uid)));
    if(!snap.empty){
      const uname=snap.docs[0].id, data=snap.docs[0].data();
      const avatar=data.avatarURL||'media/1nkown.png', url=`profile.html?u=${encodeURIComponent(uname)}`;
      btn.className='state-user'; btn.href=url;
      btn.innerHTML=`<img class="auth-avatar" src="${escHtml(avatar)}" onerror="this.src='media/1nkown.png'" alt=""><span>@${escHtml(uname)}</span>`;
      if(btnMobile){ btnMobile.href=url; btnMobile.innerHTML='👤 @'+escHtml(uname); }
    } else { btn.className='state-guest'; btn.href='login.html'; btn.innerHTML='تسجيل الدخول'; }
  }catch(e){ btn.className='state-guest'; btn.href='login.html'; btn.innerHTML='تسجيل الدخول'; }
});

/* ===== data loaders (client-side search) ===== */
async function loadUsers(){
  try{
    const snap=await getDocs(collection(db,'students'));
    const all=[]; snap.forEach(d=>all.push({id:d.id,...d.data()}));
    return smartFilter(all, s=>[s.id, s.fullName, UNIVERSITY_DICT[s.university]||s.university, s.department]);
  }catch(e){ return []; }
}
async function loadArticles(){
  try{
    let snap;
    try{ snap=await getDocs(query(collection(db,'articles'), orderBy('createdAt','desc'), limit(300))); }
    catch(e){ snap=await getDocs(collection(db,'articles')); }
    const all=snap.docs.map(d=>({id:d.id,...d.data()}));
    return smartFilter(all, a=>[a.text, a.authorName, a.author, ...(a.hashtags||[])]);
  }catch(e){ return []; }
}
async function loadShorts(){
  try{
    let snap;
    try{ snap=await getDocs(query(collection(db,'shorts'), orderBy('createdAt','desc'), limit(300))); }
    catch(e){ snap=await getDocs(collection(db,'shorts')); }
    const all=snap.docs.map(d=>({id:d.id,...d.data()}));
    return smartFilter(all, s=>[s.desc, s.authorName, s.author, ...(s.hashtags||[])]);
  }catch(e){ return []; }
}
async function loadCourses(){
  try{
    const r=await fetch('jsonfiles/courses.json'); const j=r.ok? await r.json():{};
    const jsonList=Array.isArray(j)?j:(j.courses||[]);
    let dbList=[];
    try{
      const snap=await getDocs(collection(db,'courses'));
      snap.forEach(d=>{ const c=d.data(); dbList.push({
        title:c.title, instructor:c.instructor, category:c.category,
        image:c.image?('media/'+c.image):'', placeholder:'📘',
        link:`coursplay.html?u=${encodeURIComponent(d.id)}`
      }); });
    }catch(e){}
    const list=[...dbList, ...jsonList];
    return smartFilter(list, c=>[c.title, c.instructor, c.category, c.desc, c.description]);
  }catch(e){ return []; }
}

/* ===== renderers ===== */
function renderUsers(list){
  if(!list.length) return emptyHtml('لا يوجد مستخدمون مطابقون.');
  return list.map(s=>{
    const uni=UNIVERSITY_DICT[s.university]||s.university||'';
    const av=s.avatarURL?escHtml(s.avatarURL):'media/1nkown.png';
    return `<a class="res-card" href="profile.html?u=${encodeURIComponent(s.id)}">
      <div class="res-user">
        <img class="res-avatar" src="${av}" onerror="this.src='media/1nkown.png'" alt="">
        <div>
          <div class="res-name">${escHtml('المهندس '+(s.fullName||s.id))}</div>
          <div class="res-username">@${escHtml(s.id)}</div>
          ${uni?`<div class="res-uni">${escHtml(uni)}</div>`:''}
        </div>
      </div></a>`;
  }).join('');
}
function renderArticles(list){
  if(!list.length) return emptyHtml('لا توجد مقالات مطابقة.');
  return list.map((a,i)=>{
    const av=a.authorAvatar||'media/1nkown.png';
    const img=(a.images&&a.images.length)?`<img class="res-art-thumb" src="${escHtml(a.images[0])}" onerror="this.style.display='none'" alt="">`:'';
    return `<div class="res-card" role="button" tabindex="0" style="cursor:pointer" data-article-idx="${i}">
      <div class="res-article">
        <div class="res-art-head">
          <img class="res-art-avatar" src="${escHtml(av)}" onerror="this.src='media/1nkown.png'" alt="">
          <div class="res-art-author">${escHtml('المهندس '+(a.authorName||a.author||''))}</div>
        </div>
        <div class="res-art-text">${escHtml(a.text||'')}</div>
        ${img}
      </div></div>`;
  }).join('');
}

/* ===== post modal ===== */
const postModal=document.getElementById('postModal');
function openPostModal(a){
  const av=a.authorAvatar||'media/1nkown.png';
  const img=(a.images&&a.images.length)?`<img class="pm-img" src="${escHtml(a.images[0])}" onerror="this.style.display='none'" alt="">`:'';
  const link=`profile.html?u=${encodeURIComponent(a.author||'')}&post=${encodeURIComponent(a.id)}`;
  const prof=`profile.html?u=${encodeURIComponent(a.author||'')}`;
  document.getElementById('pmBody').innerHTML=`
    <div class="pm-head">
      <img class="pm-avatar" src="${escHtml(av)}" onerror="this.src='media/1nkown.png'" alt="">
      <a class="pm-author" href="${prof}">${escHtml('المهندس '+(a.authorName||a.author||''))}</a>
    </div>
    <div class="pm-text">${escHtml(a.text||'')}</div>
    ${img}
    <a class="pm-open" href="${link}">الذهاب الى المقالة ←</a>`;
  postModal.classList.add('show'); postModal.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
}
function closePostModal(){ postModal.classList.remove('show'); postModal.setAttribute('aria-hidden','true'); document.body.style.overflow=''; }
document.getElementById('pmClose').addEventListener('click', closePostModal);
postModal.addEventListener('click', e=>{ if(e.target===postModal) closePostModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&postModal.classList.contains('show')) closePostModal(); });
function renderShorts(list){
  if(!list.length) return emptyHtml('لا توجد شورتس مطابقة.');
  return list.map((s,i)=>{
    const thumb=s.url?`<video class="res-short-thumb" src="${escHtml(s.url)}#t=0.1" muted preload="metadata" playsinline></video>`
      :`<div class="res-short-thumb"></div>`;
    return `<div class="res-card" role="button" tabindex="0" style="cursor:pointer" data-short-idx="${i}">
      <div class="res-short">
        ${thumb}
        <div>
          <div class="res-short-desc">${escHtml(s.desc||'(شورت بدون وصف)')}</div>
          <div class="res-short-author">@${escHtml(s.author||'')}</div>
        </div>
      </div></div>`;
  }).join('');
}

/* ===== inline shorts player ===== */
const spOverlay=document.getElementById('spOverlay'), spVideo=document.getElementById('spVideo');
function openShortPlayer(sh){
  if(!sh||!sh.url) return;
  spVideo.src=sh.url;
  document.getElementById('spDesc').textContent=sh.desc||'';
  const au=document.getElementById('spAuthor'); au.textContent='@'+(sh.author||''); au.href='profile.html?u='+encodeURIComponent(sh.author||'');
  document.getElementById('spOpen').href=`profile.html?u=${encodeURIComponent(sh.author||'')}&short=${encodeURIComponent(sh.id)}`;
  spOverlay.classList.add('show'); spOverlay.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  spVideo.play().catch(()=>{});
}
function closeShortPlayer(){
  spVideo.pause(); spVideo.removeAttribute('src'); spVideo.load();
  spOverlay.classList.remove('show'); spOverlay.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}
document.getElementById('spClose').addEventListener('click', closeShortPlayer);
spOverlay.addEventListener('click', e=>{ if(e.target===spOverlay) closeShortPlayer(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'&&spOverlay.classList.contains('show')) closeShortPlayer(); });
function renderCourses(list){
  if(!list.length) return emptyHtml('لا توجد كورسات مطابقة.');
  return list.map(c=>{
    const link=c.link||'course.html';
    return `<a class="res-card" href="${escHtml(link)}">
      <div class="res-course">
        <img class="res-course-img" src="${escHtml(c.image||'')}" onerror="this.style.visibility='hidden'" alt="">
        <div>
          <div class="res-course-title">${escHtml(c.title||'')}</div>
          <div class="res-course-meta">${escHtml(c.instructor||'')}${c.category?' • '+escHtml(c.category):''}</div>
        </div>
      </div></a>`;
  }).join('');
}
function emptyHtml(msg){ return `<div class="empty">${escHtml(msg)}</div>`; }

/* ===== orchestrate ===== */
const cache = { articles:null, users:null, shorts:null, courses:null };
let activeTab = 'all';
const box = document.getElementById('resultsBox');
/* الفهارس الحيّة المعروضة الآن (لربط النقر بالبيانات الصحيحة في تبويب "الكل") */
let curArticles=[], curShorts=[];

const loaders = { articles:loadArticles, users:loadUsers, shorts:loadShorts, courses:loadCourses };
const counters = { articles:'cntArticles', users:'cntUsers', shorts:'cntShorts', courses:'cntCourses' };

async function ensure(t){
  if(cache[t]===null){ cache[t]=await loaders[t](); const c=document.getElementById(counters[t]); if(c) c.textContent='('+cache[t].length+')'; }
  return cache[t];
}

function sectionHead(txt){ return `<div class="results-head" style="margin-top:8px">${escHtml(txt)}</div>`; }

async function showTab(tab){
  activeTab=tab;
  document.querySelectorAll('.search-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  box.innerHTML='<div class="loading"><div class="spinner"></div>جاري البحث...</div>';
  curArticles=[]; curShorts=[];

  if(tab==='all'){
    const [arts,usrs,shrt,crs]=await Promise.all([ensure('articles'),ensure('users'),ensure('shorts'),ensure('courses')]);
    if(activeTab!==tab) return;
    if(!arts.length&&!usrs.length&&!shrt.length&&!crs.length){ box.innerHTML=emptyHtml('لا توجد نتائج مطابقة.'); return; }
    let html='';
    if(usrs.length){ html+=sectionHead('المستخدمون')+renderUsers(usrs.slice(0,4)); }
    if(arts.length){ html+=sectionHead('المقالات'); curArticles=arts.slice(0,5); html+=renderArticles(curArticles); }
    if(shrt.length){ html+=sectionHead('الشورتس'); curShorts=shrt.slice(0,5); html+=renderShorts(curShorts); }
    if(crs.length){ html+=sectionHead('الكورسات')+renderCourses(crs.slice(0,5)); }
    box.innerHTML=html;
    return;
  }

  const data=await ensure(tab);
  if(activeTab!==tab) return;
  if(tab==='articles'){ curArticles=data; box.innerHTML=renderArticles(data); }
  else if(tab==='shorts'){ curShorts=data; box.innerHTML=renderShorts(data); }
  else if(tab==='users'){ box.innerHTML=renderUsers(data); }
  else if(tab==='courses'){ box.innerHTML=renderCourses(data); }
}

document.getElementById('searchTabs').addEventListener('click', e=>{
  const t=e.target.closest('.search-tab'); if(!t) return; showTab(t.dataset.tab);
});

/* تشغيل الشورت أو فتح المقال داخل صفحة البحث مباشرةً (يعمل في تبويب الكل أيضاً) */
function handleActivate(e){
  if(e.type==='keydown' && e.key!=='Enter' && e.key!==' ') return;
  const sCard=e.target.closest('[data-short-idx]');
  if(sCard){ e.preventDefault(); const sh=curShorts[parseInt(sCard.dataset.shortIdx,10)]; if(sh) openShortPlayer(sh); return; }
  const aCard=e.target.closest('[data-article-idx]');
  if(aCard){ e.preventDefault(); const a=curArticles[parseInt(aCard.dataset.articleIdx,10)]; if(a) openPostModal(a); return; }
}
box.addEventListener('click', handleActivate);
box.addEventListener('keydown', handleActivate);

if(!Q){
  box.innerHTML=emptyHtml('اكتب كلمة في صندوق البحث بالأعلى.');
}else{
  showTab('all');
  /* احسب العدّادات في الخلفية */
  ['users','shorts','courses','articles'].forEach(t=>ensure(t));
}
</script>
