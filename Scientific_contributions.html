<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC</title>
<link rel="icon" href="media/favicon.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --nav-height: 58px;
  --nav-pad-x: 20px;
}

/* إعداداتك الأصلية 100% */
body{
  font-family: 'Baloo Bhaijaan 2', 'Ubuntu', sans-serif;
  background-color:#FAF9F6;
  margin:0;
  padding:0;
  color:#fff;
  direction:rtl;
  text-align:right;
}

/* =========================
   NAVBAR الأصلية (بدون أي تعديل على تباعد الأزرار)
   ========================= */
#bar{
  height:var(--nav-height);
  min-height:var(--nav-height);
  box-sizing:border-box;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 var(--nav-pad-x); 
  background-color:#0047AB;

  position:sticky;
  top:0;
  z-index:1000;
  direction:ltr;
}

#bar .logo{
  font-size:35px;
  font-weight:700;
  color:#FAF9F6;
  text-decoration:none;
  cursor:pointer;
  user-select:none;
  line-height:1;
}
#bar .logo:hover{opacity:0.9;}

#bar nav{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  align-items:center;
}
#bar nav a{
  color:#FAF9F6;
  text-decoration:none;
  font-weight:700;
  padding:8px 12px;
  border-radius:10px;
  transition:background-color 0.2s;
  line-height:1;
}
#bar nav a:hover{background-color:rgba(255,255,255,0.2);}

.menu-btn{
  display:none;
  height:42px;
  width:42px;
  padding:0;
  border:0;
  background:transparent;
  cursor:pointer;
  border-radius:10px;
}
.menu-btn:hover{background:rgba(255,255,255,0.18);}

.menu-icon{
  width:24px;
  height:2px;
  background:#fff;
  display:block;
  position:relative;
  margin:auto;
}
.menu-icon::before,
.menu-icon::after{
  content:"";
  position:absolute;
  left:0;
  width:24px;
  height:2px;
  background:#fff;
  transition:transform .18s ease, top .18s ease, opacity .18s ease;
}
.menu-icon::before{top:-7px;}
.menu-icon::after{top:7px;}

.menu-btn[aria-expanded="true"] .menu-icon{background:transparent;}
.menu-btn[aria-expanded="true"] .menu-icon::before{top:0;transform:rotate(45deg);}
.menu-btn[aria-expanded="true"] .menu-icon::after{top:0;transform:rotate(-45deg);}

#menuBackdrop{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  z-index:999;
}
#menuBackdrop.show{display:block;}

.mobile-menu{
  display:none;
  position:absolute;
  right:16px;
  top:calc(var(--nav-height) + 8px);
  min-width:240px;
  background:#fff;
  color:#111827;
  border-radius:14px;
  padding:8px;
  box-shadow:0 14px 35px rgba(0,0,0,0.22);
  border:1px solid rgba(0,0,0,0.06);
  z-index:1001;

  direction:rtl;
  text-align:right;

  transform-origin:top right;
  transform:translateY(-6px) scale(0.98);
  opacity:0;
  transition:opacity .14s ease, transform .14s ease;
}
.mobile-menu.open{
  display:block;
  opacity:1;
  transform:translateY(0) scale(1);
}
.mobile-menu a{
  display:block;
  padding:11px 12px;
  border-radius:10px;
  color:#111827;
  text-decoration:none;
  font-weight:800;
}
.mobile-menu a:hover{background:#f3f4f6;}


/* =========================
   محتوى الصفحة الجديدة (البحث والبطاقات)
   ========================= */
.hero-section {
  text-align: center;
  background-color: #008080; /* اللون الأخضر الخاص بك */
  padding: 40px 20px;
  margin-top: 0;
}
.hero-section h1 {
  font-size: 30px;
  margin-bottom: 20px;
  color: #FAF9F6;
}
.search-input {
  width: 90%;
  max-width: 500px;
  padding: 15px 20px;
  font-size: 16px;
  font-family: inherit;
  border: none;
  border-radius: 30px;
  outline: none;
  color: #000; /* لون النص داخل البحث أسود ليكون مقروءاً */
}

.news-container {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}

.news-card {
  background-color: #008080;
  border-radius: 10px;
  text-decoration: none;
  color: #FAF9F6;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s;
}
.news-card:hover {
  transform: translateY(-5px);
}

.news-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background-color: #0047AB; /* لون بديل لو لم توجد صورة */
}

.news-content {
  padding: 20px;
}
.news-date {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 10px;
}
.news-title {
  font-size: 20px;
  margin: 0 0 10px 0;
  font-weight: 700;
}
.news-summary {
  font-size: 16px;
  line-height: 1.6;
  margin: 0;
}

.no-results {
  text-align: center;
  color: #333; /* رمادي غامق ليكون مقروءاً على الخلفية الفاتحة */
  font-size: 18px;
  grid-column: 1 / -1;
  display: none;
}

@media (max-width:768px){
  #bar nav{display:none;}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center;}
  .news-container { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<header id="bar">
  <a class="logo" href="index.html" aria-label="العودة للصفحة الرئيسية">ESC</a>

  <nav aria-label="روابط الموقع">
    <a href="faq.html">الأسئلة الشائعة</a>
    <a href="course.html">الدروس الأكاديمية</a>
    <a href="Scientific_contributions.html">المساهمات العلمية</a>
    <a href="research.html">الأبحاث</a>
    <a href="volunteer.html">برامج التطوع</a>
  </nav>

  <button id="menuBtn" class="menu-btn" aria-label="خيارات" aria-expanded="false" aria-controls="mobileMenu">
    <span class="menu-icon" aria-hidden="true"></span>
  </button>

  <div id="mobileMenu" class="mobile-menu" role="menu" aria-label="قائمة الهاتف">
    <a role="menuitem" href="faq.html">الأسئلة الشائعة</a>
    <a role="menuitem" href="course.html">الدروس الأكاديمية</a>
    <a role="menuitem" href="Scientific_contributions.html">المساهمات العلمية</a>
    <a role="menuitem" href="research.html">الأبحاث</a>
    <a role="menuitem" href="volunteer.html">برامج التطوع</a>
  </div>
</header>
<div id="menuBackdrop" aria-hidden="true"></div>

<div class="hero-section">
  <h1>المساهمات العلمية</h1>
  <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن مساهمة، خبر، أو كلمة مفتاحية...">
</div>

<div class="news-container" id="newsGrid">
  </div>
<div id="noResults" class="no-results">لم نتمكن من العثور على نتائج تطابق بحثك.</div>

<script>
/* =========================================
   أكواد القائمة المنسدلة (مطابقة للأصل)
   ========================================= */
const menuBtn = document.getElementById('menuBtn');
const mobileMenu = document.getElementById('mobileMenu');
const backdrop = document.getElementById('menuBackdrop');

function openMenu(){ mobileMenu.classList.add('open'); backdrop.classList.add('show'); menuBtn.setAttribute('aria-expanded','true'); }
function closeMenu(){ mobileMenu.classList.remove('open'); backdrop.classList.remove('show'); menuBtn.setAttribute('aria-expanded','false'); }
function toggleMenu(){ const isOpen = menuBtn.getAttribute('aria-expanded') === 'true'; isOpen ? closeMenu() : openMenu(); }

menuBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleMenu(); });
backdrop.addEventListener('click', closeMenu);
document.addEventListener('click', (e)=>{ if(!mobileMenu.contains(e.target) && e.target !== menuBtn){ closeMenu(); } });
document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeMenu(); });
mobileMenu.querySelectorAll('a').forEach(a=>{ a.addEventListener('click', closeMenu); });
window.addEventListener('resize', ()=>{ if(window.innerWidth > 768) closeMenu(); });

/* =========================================
   إدارة الأخبار والبحث (بسيطة جداً)
   ========================================= */
// يمكنك إضافة الأخبار الجديدة هنا بسهولة بوضعها في أعلى القائمة
const newsData = [
  {
    id: "20260313",
    title: "إطلاق مكتبة المصادر الهندسية المفتوحة",
    summary: "تمت إضافة أكثر من 50 مرجعاً جديداً في مختلف التخصصات الهندسية لخدمة الطلاب لتسهيل مشاريع التخرج والأبحاث."
  },
  {
    id: "20260228",
    title: "ورشة عمل: أساسيات لغات البرمجة للمهندسين",
    summary: "بمساهمة من نخبة من أعضاء المنصة، أقمنا ورشة عمل ناجحة لمساعدة الطلاب على دمج البرمجة في الحلول الهندسية."
  }
];

const newsGrid = document.getElementById('newsGrid');
const searchInput = document.getElementById('searchInput');
const noResults = document.getElementById('noResults');

function renderNews(newsArray) {
  newsGrid.innerHTML = ''; 
  if (newsArray.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  newsArray.forEach(news => {
    const year = news.id.substring(0, 4);
    const month = news.id.substring(4, 6);
    const day = news.id.substring(6, 8);
    
    const card = document.createElement('a');
    card.href = `news/${news.id}.html`;
    card.className = 'news-card';

    // نستخدم مسار الصورة وصورة بديلة في حال غيابها
    card.innerHTML = `
      <img src="news/${news.id}.jpg" alt="${news.title}" class="news-image" onerror="this.src='media/favicon.png';">
      <div class="news-content">
        <div class="news-date">${year}/${month}/${day}</div>
        <div class="news-title">${news.title}</div>
        <div class="news-summary">${news.summary}</div>
      </div>
    `;
    newsGrid.appendChild(card);
  });
}

renderNews(newsData);

searchInput.addEventListener('input', function(e) {
  const searchTerm = e.target.value.toLowerCase();
  const filteredNews = newsData.filter(news => {
    return news.title.toLowerCase().includes(searchTerm) || news.summary.toLowerCase().includes(searchTerm);
  });
  renderNews(filteredNews);
});
</script>

</body>
</html>
